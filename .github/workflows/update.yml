name: ATP · WTA Value Bet

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      bankroll:
        description: 'Bankroll (USD)'
        default: '1000'
      force_elo:
        description: 'Elo frissítés? (yes/no)'
        default: 'no'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}-v4

      - run: pip install -r requirements.txt

      - name: Heti Elo (ATP + WTA)
        if: github.event.schedule == '0 6 * * 1' || github.event.inputs.force_elo == 'yes'
        run: python fetch_elo.py

      - name: Napi meccsek + HTML
        id: run
        run: |
          ELO_EXISTS=false
          [ -f "data/elo_ratings_atp.json" ] && [ -f "data/elo_ratings_wta.json" ] && ELO_EXISTS=true
          BANKROLL="${{ github.event.inputs.bankroll || '1000' }}"
          if [ "$ELO_EXISTS" = "true" ]; then
            python main.py --bankroll "$BANKROLL" --skip-elo 2>&1 | tee /tmp/run_output.txt
          else
            python main.py --bankroll "$BANKROLL" 2>&1 | tee /tmp/run_output.txt
          fi

          # Összefoglaló számok kinyerése a logból
          ATP_MATCHES=$(grep -oP 'ATP: \K\d+(?= meccs)' /tmp/run_output.txt || echo "?")
          WTA_MATCHES=$(grep -oP 'WTA: \K\d+(?= meccs)' /tmp/run_output.txt || echo "?")
          VALUE_COUNT=$(grep -c "VALUE" /tmp/run_output.txt || echo "0")
          ADV_COUNT=$(grep -c "felületi előny" /tmp/run_output.txt || echo "0")

          echo "atp_matches=$ATP_MATCHES"   >> $GITHUB_OUTPUT
          echo "wta_matches=$WTA_MATCHES"   >> $GITHUB_OUTPUT
          echo "value_count=$VALUE_COUNT"   >> $GITHUB_OUTPUT
          echo "adv_count=$ADV_COUNT"       >> $GITHUB_OUTPUT

      - name: Commit & push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html data/ || true
          git diff --staged --quiet || git commit -m "🎾 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: 📲 ntfy értesítés
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          ATP="${{ steps.run.outputs.atp_matches }}"
          WTA="${{ steps.run.outputs.wta_matches }}"
          VALUE="${{ steps.run.outputs.value_count }}"
          ADV="${{ steps.run.outputs.adv_count }}"

          MSG="ATP: ${ATP:-?} meccs | WTA: ${WTA:-?} meccs"
          if [ "$VALUE" != "0" ] && [ -n "$VALUE" ]; then
            MSG="$MSG | 🎯 ${VALUE} value bet"
          fi
          if [ "$ADV" != "0" ] && [ -n "$ADV" ]; then
            MSG="$MSG | ⚡ ${ADV} felületi előny"
          fi

          curl -s \
            -H "Title: 🎾 Value Bet frissült" \
            -H "Priority: default" \
            -H "Tags: tennis,chart_with_upwards_trend" \
            -H "Click: https://czakopeti.github.io/tennis/" \
            -d "$MSG — $DATE" \
            "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy küldés sikertelen (nem blokkolja a deploy-t)"
