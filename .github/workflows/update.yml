name: ATP · WTA Value Bet

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      bankroll:
        description: 'Bankroll (USD)'
        default: '1000'
      force_elo:
        description: 'Elo frissítés? (yes/no)'
        default: 'no'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}-v5
      - run: pip install -r requirements.txt

      - name: Heti Elo (ATP + WTA)
        if: github.event.schedule == '0 6 * * 1' || github.event.inputs.force_elo == 'yes'
        run: python fetch_elo.py

      - name: Napi meccsek + HTML
        id: run
        run: |
          ELO_EXISTS=false
          [ -f "data/elo_ratings_atp.json" ] && [ -f "data/elo_ratings_wta.json" ] && ELO_EXISTS=true
          BANKROLL="${{ github.event.inputs.bankroll || '1000' }}"
          if [ "$ELO_EXISTS" = "true" ]; then
            python main.py --bankroll "$BANKROLL" --skip-elo 2>&1 | tee /tmp/run_output.txt
          else
            python main.py --bankroll "$BANKROLL" 2>&1 | tee /tmp/run_output.txt
          fi
          # Összefoglaló — grep -c sosem üres, mert || echo "0" mindig stringet ad
          ATP_M=$(python3 -c "
import re,sys
txt=open('/tmp/run_output.txt').read()
m=re.search(r'ATP: (\d+) meccs',txt)
print(m.group(1) if m else '0')
")
          WTA_M=$(python3 -c "
import re,sys
txt=open('/tmp/run_output.txt').read()
m=re.search(r'WTA: (\d+) meccs',txt)
print(m.group(1) if m else '0')
")
          VALUE_M=$(python3 -c "
import re,sys
txt=open('/tmp/run_output.txt').read()
print(str(txt.count('VALUE')))
")
          ADV_M=$(python3 -c "
import re,sys
txt=open('/tmp/run_output.txt').read()
print(str(txt.count('felületi előny')))
")
          echo "atp_matches=${ATP_M}" >> "$GITHUB_OUTPUT"
          echo "wta_matches=${WTA_M}" >> "$GITHUB_OUTPUT"
          echo "value_count=${VALUE_M}" >> "$GITHUB_OUTPUT"
          echo "adv_count=${ADV_M}"    >> "$GITHUB_OUTPUT"

      - name: Commit & push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html data/ || true
          git diff --staged --quiet || git commit -m "🎾 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: ntfy értesítés
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          ATP="${{ steps.run.outputs.atp_matches }}"
          WTA="${{ steps.run.outputs.wta_matches }}"
          VALUE="${{ steps.run.outputs.value_count }}"
          ADV="${{ steps.run.outputs.adv_count }}"
          MSG="ATP: ${ATP:-0} | WTA: ${WTA:-0} meccs"
          [ "${VALUE:-0}" != "0" ] && MSG="$MSG | 🎯 ${VALUE} value"
          [ "${ADV:-0}"   != "0" ] && MSG="$MSG | ⚡ ${ADV} felületi"
          curl -s \
            -H "Title: 🎾 Value Bet frissült" \
            -H "Priority: default" \
            -H "Tags: tennis" \
            -H "Click: https://czakopeti.github.io/tennis/" \
            -d "$MSG — $DATE" \
            "https://ntfy.sh/${NTFY_TOPIC}" || true
